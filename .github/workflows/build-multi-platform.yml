name: Build Multi-Platform OpenWrt

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH 连接 CI 环境调试（失败时设为 true）'
        required: false
        default: 'false'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-multi-platform.yml'
      - 'configs/**'
      - 'diy_part/**'
      - 'compile_script/**'

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate build matrix
        id: set-matrix
        run: bash compile_script/platforms.sh

  build:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Space cleanup & Install dependencies
        run: |
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* mysql* php* mongodb* snapd* 2>/dev/null || true
          sudo -E apt-get update
          sudo -E apt-get full-upgrade -y
          sudo -E apt-get install -y $(cat ${{ matrix.value.DEPENDENCE }})
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          df -h

      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 ${{ matrix.value.REPO_URL }} -b ${{ matrix.value.REPO_BRANCH }} openwrt

      - name: Setup Docker & Login GHCR
        run: |
          sudo systemctl stop docker
          sudo mkdir -p /workdir/docker
          echo '{"data-root":"/workdir/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "Docker data-root: $(docker info | grep 'Docker Root Dir')"

      - name: Restore cache from GHCR
        run: |
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PLATFORM_TAG=$(echo "${{ matrix.value.PLATFORM }}-${{ matrix.value.CONFIG_NAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="ghcr.io/${REPO_OWNER_LOWER}/openwrt-cache-${PLATFORM_TAG}:latest"
          echo "Cache image: $IMAGE_TAG"

          if docker pull "$IMAGE_TAG" 2>/dev/null; then
            docker create --name cache_tmp "$IMAGE_TAG" /bin/true
            docker export cache_tmp > /tmp/cache_exported.tar
            docker rm cache_tmp
            docker rmi "$IMAGE_TAG" -f

            tar -xf /tmp/cache_exported.tar --wildcards "op_cache_raw_*" 2>/dev/null || true

            if ls op_cache_raw_* 1>/dev/null 2>&1; then
              cat op_cache_raw_* | tar -I "zstd -T0" -xf - -C openwrt/
              rm -f /tmp/cache_exported.tar op_cache_raw_*
              echo "✅ 缓存恢复成功！"
            else
              echo "⊙ 未找到有效缓存分块，将进行完整编译"
              rm -f /tmp/cache_exported.tar
            fi
          else
            echo "⊙ 未找到远程缓存镜像，将进行完整编译"
          fi

      - name: SSH debug session
        uses: mxschmitt/action-tmate@v3.23
        if: github.event.inputs.ssh == 'true'
        timeout-minutes: 30

      - name: DIY Part1 (Feeds 检查与注入)
        run: |
          chmod +x ${{ matrix.value.DIY_P1 }}
          cd openwrt
          bash "../${{ matrix.value.DIY_P1 }}"

      - name: Setup feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config & DIY Part2
        run: |
          [ -e files ] && cp -rf files openwrt/files
          cp -f ${{ matrix.value.CONFIG_FILE }} openwrt/.config
          [ -f "${{ matrix.value.SEED_CONFIG }}" ] && cat ${{ matrix.value.SEED_CONFIG }} >> openwrt/.config
          chmod +x ${{ matrix.value.DIY_P2 }}
          cd openwrt
          bash "../${{ matrix.value.DIY_P2 }}"

      - name: Make defconfig & Download packages
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc) || make download -j1 V=s
          find dl -size -1024c -exec rm -f {} \;

      - name: DIY Part3 (编译前优化)
        run: |
          cd openwrt
          bash "../${{ matrix.value.DIY_P3 }}"

      - name: Compile tools & toolchain (base)
        run: |
          cd openwrt
          touch /tmp/base_compilation_marker
          echo "==== 0/3 预编译易出问题的 tools（单线程 + 详细日志）===="
          time make tools/elfutils/compile -j1 V=s || exit 1
          echo "==== 1/3 编译 tools ===="
          time make tools/compile -j$(nproc) || exit 1
          echo "==== 2/3 编译 toolchain ===="
          time make toolchain/compile -j$(nproc) || exit 1

      - name: Checkpoint cache save
        run: |
          cd openwrt
          # 检查是否有新编译产物
          IGNORE_PATTERN="staging_dir/host/stamp/\.tools_compile_|staging_dir/target-[^/]+/stamp/\.target_prereq$"

          CHANGED=$(find build_dir staging_dir -type f \
            -newer /tmp/base_compilation_marker -path "*/stamp/*" 2>/dev/null | \
            grep -E -v "$IGNORE_PATTERN" | wc -l)

          if [ "$CHANGED" -eq 0 ]; then
            echo "⊙ Base 阶段无新编译产物，跳过缓存上传"
            exit 0
          fi

          echo "✓ 检测到 $CHANGED 个新编译产物，开始保存缓存..."

          # 裁剪旧内核版本目录
          for d in build_dir/target-*/linux-*/; do
            [ -d "$d" ] && (cd "$d" && ls -dt linux-* 2>/dev/null | tail -n +2 | xargs -r rm -rf)
          done

          # 修复 dl/ 时间戳防止伪重编译
          find dl -type f -exec touch -t 200001010000 {} \; 2>/dev/null || true

          # 压缩（zstd 级别 10）+ 分块（5GB）
          echo "压缩 build_dir + staging_dir + dl ..."
          tar -I "zstd -T0 -10" -cf - build_dir staging_dir dl 2>/dev/null | \
            split -a 3 -d -b 5000M - /tmp/op_cache_raw_

          # 构建多层 Docker 镜像
          cd /tmp
          echo "FROM scratch" > Dockerfile
          count=1
          for f in op_cache_raw_*; do
            mkdir -p "layer$count"
            mv "$f" "layer$count/"
            echo "COPY layer$count /" >> Dockerfile
            count=$((count + 1))
          done

          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          PLATFORM_TAG=$(echo "${{ matrix.value.PLATFORM }}-${{ matrix.value.CONFIG_NAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="ghcr.io/${REPO_OWNER_LOWER}/openwrt-cache-${PLATFORM_TAG}:latest"

          echo "构建缓存镜像: $IMAGE_TAG ($((count - 1)) layers)"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "✅ 缓存镜像已推送"

          # 清理
          rm -rf layer* Dockerfile op_cache_raw_*
          docker rmi "$IMAGE_TAG" -f || true

      - name: Compile firmware
        run: |
          cd openwrt
          echo "$(nproc) thread build — ${{ matrix.value.RELEASE_PREFIX }} ${{ matrix.value.CONFIG_NAME }}"
          set -o pipefail
          make -j$(nproc) 2>&1 | perl -nE 'BEGIN{$|=1; $t0=time} $t=time; printf "[%5ds] %s", $t-$t0, $_' || make -j1 V=s
          df -h

      - name: Organize firmware
        run: |
          echo "=== 固件目录结构 ==="
          find openwrt/bin/targets -type f -name "*.img.gz" -o -name "*.manifest" -o -name "*.buildinfo" 2>/dev/null | sort
          FIRMWARE_DIR=$(ls -d openwrt/bin/targets/*/* 2>/dev/null | head -1)
          if [ -z "$FIRMWARE_DIR" ]; then
            echo "❌ 错误：找不到固件目录！"
            ls -R openwrt/bin/targets/ 2>/dev/null || echo "bin/targets 为空"
            exit 1
          fi
          echo "固件目录: $FIRMWARE_DIR"
          cd "$FIRMWARE_DIR"
          rm -rf packages
          echo "=== 最终上传文件 ==="
          ls -lah
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}-${{ matrix.value.PLATFORM }}
          files: ${{ env.FIRMWARE }}/*
          name: ${{ matrix.value.RELEASE_PREFIX }} ${{ matrix.value.CONFIG_NAME }} ${{ steps.tag.outputs.release_tag }}
